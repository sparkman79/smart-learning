# ============================================================
# Home Assistant 配置 - 智能学习系统
# ============================================================

# ----------------------------------------
# 1. Timer
# ----------------------------------------
timer:
  study_pomodoro:
    duration: "00:25:00"
    name: "学习计时器"

# ----------------------------------------
# 2. 学习脚本
# ----------------------------------------
script:
  study_start:
    alias: "Study Start"
    mode: restart
    fields:
      message:
        name: "播报文本"
        description: "开场播报内容"
        example: "开始学习，本轮 25 分钟。"
    sequence:
      - service: light.turn_on
        target:
          entity_id: light.study_lamp  # 改为实际台灯实体 ID
        data:
          brightness_pct: 90
          color_temp: 250
      - service: tts.google_translate_say
        target:
          entity_id: media_player.xiaoai_speaker  # 改为实际音响实体 ID
        data:
          message: "{{ message | default('开始学习，本轮 25 分钟。') }}"
      - service: timer.start
        target:
          entity_id: timer.study_pomodoro
        data:
          duration: "00:25:00"

  study_break:
    alias: "Study Break"
    mode: restart
    sequence:
      - service: light.turn_on
        target:
          entity_id: light.study_lamp
        data:
          brightness_pct: 40
          color_temp: 400
      - service: tts.google_translate_say
        target:
          entity_id: media_player.xiaoai_speaker
        data:
          message: "休息 5 分钟，喝水走动，护眼看远处 20 秒。"

  study_end:
    alias: "Study End"
    mode: restart
    sequence:
      - service: light.turn_on
        target:
          entity_id: light.study_lamp
        data:
          brightness_pct: 60
          color_temp: 350
      - service: tts.google_translate_say
        target:
          entity_id: media_player.xiaoai_speaker
        data:
          message: "学习结束。请在群里回复：已完成。"
      - service: timer.cancel
        target:
          entity_id: timer.study_pomodoro

  study_soft_nudge:
    alias: "Study Soft Nudge"
    mode: restart
    sequence:
      - service: light.turn_on
        target:
          entity_id: light.study_lamp
        data:
          brightness_pct: 70
      - service: tts.google_translate_say
        target:
          entity_id: media_player.xiaoai_speaker
        data:
          message: "提醒一下：现在开始第一关。"

  study_night_silent_nudge:
    alias: "Study Night Silent Nudge"
    mode: restart
    sequence:
      - service: light.turn_on
        target:
          entity_id: light.study_lamp
        data:
          brightness_pct: 50
          color_temp: 400
      - delay: "00:00:01"
      - service: light.turn_off
        target:
          entity_id: light.study_lamp
      - delay: "00:00:01"
      - service: light.turn_on
        target:
          entity_id: light.study_lamp
        data:
          brightness_pct: 50
          color_temp: 400

# ----------------------------------------
# 3. Automation - 节奏推进
# ----------------------------------------
automation:
  - alias: "Study Pomodoro -> Break -> Continue"
    mode: single
    trigger:
      - platform: event
        event_type: timer.finished
        event_data:
          entity_id: timer.study_pomodoro
    action:
      - service: script.study_break
      - delay: "00:05:00"
      - service: script.study_start
        data:
          message: "休息结束，继续下一轮 25 分钟。"

